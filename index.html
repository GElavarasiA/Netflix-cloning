<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Netflix Clone</title>
</head>
<body>
    <div class="nav" id="nav">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="nav_logo" alt="Netflix Logo">
    </div>

    <header id="banner">
        <div id="banner_contents">
            <h1 id="banner_title">Movie Name</h1>
            <div id="banner_buttons">
                <button class="banner_button">Play</button>
                <button class="banner_button">New List</button>
            </div>
            <h1 id="banner_description">Movie description goes here...</h1>
        </div>
        <div id="banner--fadeBottom"></div>
    </header>

    <div id="headrow"></div>

    <script src="script.js"></script>
</body>
</html>
